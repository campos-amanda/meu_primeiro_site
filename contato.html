<body>

    <form>
        <h1>Contato</h1>

        <br><br>

        <label>Nome:</label>

        <br><br>

        <label>Telefone:</label>

        <br><br>

        <label>Assunto:</label>
        <input type="text" placeholder="Assunto" required>

        <br><br>

        <label>Mensagem:</label>
        <textarea></textarea>

        <br><br>

        <label>
            <input type="checkbox" required>
            Aceite os termos
        </label>

        <br><br>

        <button type="submit">Enviar</button> <br><br>
    </form>
<button><a href="/index.html">Quem sou eu</a></button>
